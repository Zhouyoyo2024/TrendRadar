# ═══════════════════════════════════════════════════════════════
#                   TrendRadar 时间线配置
#                      Version: 1.2.0
# ═══════════════════════════════════════════════════════════════
#
# 自定义配置：每天早上9点和晚上19点推送，其他时间只采集不推送
#

presets:
  custom:
    name: "每日两推"
    description: "每天早上9点和晚上19点推送热点，其他时间只采集数据"

    default:
      collect: true
      analyze: false
      ai_mode: "current"
      push: false
      report_mode: "current"
      once:
        analyze: true
        push: true

    periods:

      morning_push:
        name: "早间推送"
        start: "08:30"
        end: "09:30"
        analyze: true
        ai_mode: "current"
        push: true
        report_mode: "current"
        once:
          analyze: true
          push: true

      evening_push:
        name: "晚间推送"
        start: "18:30"
        end: "19:30"
        analyze: true
        ai_mode: "daily"
        push: true
        report_mode: "daily"
        once:
          analyze: true
          push: true

    day_plans:
      daily:
        periods: ["morning_push", "evening_push"]

    week_map:
      1: "daily"
      2: "daily"
      3: "daily"
      4: "daily"
      5: "daily"
      6: "daily"
      7: "daily"

    overlap:
      policy: "error_on_overlap"
